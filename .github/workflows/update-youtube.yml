name: YouTube M3U Guncelleyici

on:
  schedule:
    - cron: '0 */3 * * *' # Her 3 saatte bir çalışır
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: YouTube Scriptini Çalıştır
      run: python youtube_scraper.py

    - name: Yeni YouTube Listesini Kaydet (Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add youtube.m3u
        git commit -m "Otomatik Güncelleme: YouTube M3U8 linkleri yenilendi" || exit 0
        git push
