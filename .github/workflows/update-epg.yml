name: EPG Güncelle

on:
  schedule:
    # Her gün Türkiye saatiyle 00:30'da çalışır (UTC 21:30)
    - cron: '30 21 * * *'
  # Elle de tetiklenebilir
  workflow_dispatch:

jobs:
  scrape-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: |
          pip install requests beautifulsoup4 pytz lxml

      - name: EPG scraper çalıştır
        run: python epg_scraper.py

      - name: epg.xml dosyasını commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.xml
          git diff --cached --quiet || git commit -m "EPG güncellendi: $(TZ='Europe/Istanbul' date +'%Y-%m-%d %H:%M')"
          git push
