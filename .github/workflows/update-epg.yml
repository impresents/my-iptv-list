name: EPG Güncelle

on:
  workflow_dispatch:
  schedule:
    - cron: '30 21 * * *'

permissions:
  contents: write

jobs:
  scrape-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: EPG scraper çalıştır
        run: python epg_scraper.py

      - name: epg.xml dosyasını commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add epg.xml
          git diff --cached --quiet || git commit -m "EPG güncellendi"
          git push
